<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>System Security Check</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 400px;
      background: #111827;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .status {
      margin: 15px 0;
      font-size: 14px;
      color: #94a3b8;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: #1f2937;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 15px;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: #22c55e;
      transition: width 0.5s;
    }

    .log {
      text-align: left;
      font-size: 12px;
      background: #020617;
      padding: 10px;
      border-radius: 10px;
      height: 120px;
      overflow-y: auto;
    }

    .final {
      display: none;
      margin-top: 20px;
      font-size: 16px;
      color: #22c55e;
    }

    .fake-ip {
      font-weight: bold;
      color: #38bdf8;
    }

  </style>
</head>
<body>

<div class="container">
  <h1>🔒 System Security Check</h1>
  <div class="status" id="status">Initializing...</div>

  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>

  <div class="log" id="log"></div>

  <div class="final" id="final">
    <p>Thanks, I have your IP now <3</p>
    <p>- aluminati </p>
    <p style="font-size:12px; margin-top:10px;">count your days mate!</p>
  </div>
</div>

<script>
const steps = [
  "Connecting to secure server...",
  "Analyzing device...",
  "Scanning network...",
  "Checking vulnerabilities...",
  "Extracting data...",
  "Finalizing scan..."
];

const log = document.getElementById("log");
const status = document.getElementById("status");
const progress = document.getElementById("progress");
const final = document.getElementById("final");

let i = 0;

function fakeIP() {
  return `${rand()}.${rand()}.${rand()}.${rand()}`;
}

function rand() {
  return Math.floor(Math.random() * 255);
}

function nextStep() {
  if (i < steps.length) {
    status.innerText = steps[i];
    log.innerHTML += "> " + steps[i] + "<br>";
    log.scrollTop = log.scrollHeight;

    progress.style.width = ((i + 1) / steps.length) * 100 + "%";
    i++;
    setTimeout(nextStep, 900);
  } else {
    status.innerText = "Scan Complete";
    log.innerHTML += "> IP Detected: <span class='fake-ip'>" + fakeIP() + "</span><br>";
    final.style.display = "block";
  }
}

setTimeout(nextStep, 1000);
</script>

</body>
</html>
